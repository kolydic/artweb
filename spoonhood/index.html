<!DOCTYPE html>
<link href='https://fonts.googleapis.com/css?family=Gaegu' rel='stylesheet'>


<style>

html {
    font-family: 'Gaegu';
    background-color: rgb(250, 205, 205);
}

input[type="radio"]{
  accent-color: #915151;
}

.exp_frame {
    width: 100vw;
    height: 100vh;
    border: none;
    display: none;
}

#visual:checked ~ #visual-frame {
    display: block;
}

#text:checked ~ #text-frame {
    display: block;
}

</style>

<html>

<body>

    <h2>welcome to... <h1>S P O O N H O O D</h1>(SPOONHOOD!) (?)</h2><br>
    <h3>explore the questions that plague us all: <br> what makes a spoon a spoon? what makes a not-spoon a not-spoon? <br>
        what <i>REALLY</i> gives spoons their SPOONHOOD?</h3>

    do you want a visual, interactive experience...or a text-based experience? choose below:<br><br>

    <input type="radio" id="visual" name="experience" value="visual">
    <label for="visual">visual, interactive</label><br>
    <input type="radio" id="text" name="experience" value="text">
    <label for="text">text-based</label><br><br>
    
    <iframe class="exp_frame" id="visual-frame" src="visual.html" title="visual experience"></iframe>
    <iframe class="exp_frame" id="text-frame" src="textual.html" title="text experience"></iframe>


</body>
</html>
